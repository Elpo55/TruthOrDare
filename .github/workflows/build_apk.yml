name: Build Android APK

on:
  push:
    branches:
      - main # À remplacer par "master" si votre branche principale s'appelle master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout le code
        uses: actions/checkout@v4

      - name: Configurer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Installer Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Compiler l'APK avec Gradle Global
        run: gradle assembleDebug

      - name: Télécharger l'APK généré
        uses: actions/upload-artifact@v4
        with:
          name: MonApplication-APK
          path: app/build/outputs/apk/debug/app-debug.apk
